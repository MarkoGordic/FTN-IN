<svg width="680" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  .th { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 600; }
  .ts { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 400; }
  .tl { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 500; }
</style>

<!-- ═══════════════════════════════════════════ -->
<!-- STEP 1: BEFORE                              -->
<!-- ═══════════════════════════════════════════ -->
<text class="th" x="40" y="24" fill="#0F6E56">① Polazno stanje (r = 2)</text>
<text class="ts" x="40" y="42" fill="#888780">Treba obrisati ključ 07 iz čvora C<tspan font-size="10" dy="2">e</tspan></text>

<!-- Parent C -->
<text class="ts" x="340" y="62" text-anchor="middle" fill="#5F5E5A">nadređeni čvor C</text>
<rect x="196" y="72" width="288" height="38" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="276" y1="72" x2="276" y2="110" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="356" y1="72" x2="356" y2="110" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="420" y1="72" x2="420" y2="110" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="236" y="91" text-anchor="middle" dominant-baseline="central" fill="#444441">03</text>
<text class="th" x="316" y="91" text-anchor="middle" dominant-baseline="central" fill="#444441">10</text>
<text class="th" x="388" y="91" text-anchor="middle" dominant-baseline="central" fill="#444441">30</text>
<text class="th" x="452" y="91" text-anchor="middle" dominant-baseline="central" fill="#444441">50</text>

<!-- Edges to 3 visible children -->
<line x1="276" y1="110" x2="156" y2="150" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="356" y1="110" x2="380" y2="150" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="80" y="152" text-anchor="middle" fill="#B4B2A9">...</text>
<text class="ts" x="540" y="152" text-anchor="middle" fill="#B4B2A9">...</text>

<!-- Ce: [05 | 07] -->
<rect x="96" y="156" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="144" y1="156" x2="144" y2="192" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="120" y="174" text-anchor="middle" dominant-baseline="central" fill="#085041">05</text>
<!-- 07 marked for deletion -->
<rect x="144" y="156" width="48" height="36" rx="0" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.2"/>
<text class="th" x="168" y="174" text-anchor="middle" dominant-baseline="central" fill="#791F1F">07</text>
<line x1="150" y1="162" x2="186" y2="186" stroke="#E24B4A" stroke-width="1.5"/>
<line x1="186" y1="162" x2="150" y2="186" stroke="#E24B4A" stroke-width="1.5"/>
<text class="ts" x="144" y="206" text-anchor="middle" fill="#444441">C<tspan font-size="10" dy="2">e</tspan><tspan dy="-2">  (m = 2)</tspan></text>

<!-- Cf: [15 | 20] - exactly r elements -->
<rect x="332" y="156" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="380" y1="156" x2="380" y2="192" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="356" y="174" text-anchor="middle" dominant-baseline="central" fill="#085041">15</text>
<text class="th" x="404" y="174" text-anchor="middle" dominant-baseline="central" fill="#085041">20</text>
<text class="ts" x="380" y="206" text-anchor="middle" fill="#444441">C<tspan font-size="10" dy="2">f</tspan><tspan dy="-2">  (m = r = 2)</tspan></text>

<!-- ═══════════ Divider ═══════════ -->
<line x1="40" y1="228" x2="640" y2="228" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.3"/>

<!-- ═══════════════════════════════════════════ -->
<!-- STEP 2: PROBLEM                             -->
<!-- ═══════════════════════════════════════════ -->
<text class="th" x="40" y="250" fill="#A32D2D">② Nakon brisanja 07: ni pozajmljivanje ni dovoljno elemenata</text>
<text class="ts" x="40" y="268" fill="#888780">m<tspan font-size="10" dy="2">e</tspan><tspan dy="-2"> = r - 1 = 1.  Sused C</tspan><tspan font-size="10" dy="2">f</tspan><tspan dy="-2"> ima tačno r = 2 elem. → ne može pozajmiti → spajanje!</tspan></text>

<!-- Parent C -->
<rect x="196" y="286" width="288" height="38" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="276" y1="286" x2="276" y2="324" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="356" y1="286" x2="356" y2="324" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="420" y1="286" x2="420" y2="324" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="236" y="305" text-anchor="middle" dominant-baseline="central" fill="#444441">03</text>
<text class="th" x="316" y="305" text-anchor="middle" dominant-baseline="central" fill="#444441">10</text>
<text class="th" x="388" y="305" text-anchor="middle" dominant-baseline="central" fill="#444441">30</text>
<text class="th" x="452" y="305" text-anchor="middle" dominant-baseline="central" fill="#444441">50</text>

<line x1="276" y1="324" x2="132" y2="370" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="356" y1="324" x2="380" y2="370" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Ce: [05] - PROBLEM -->
<rect x="108" y="376" width="48" height="36" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text class="th" x="132" y="394" text-anchor="middle" dominant-baseline="central" fill="#791F1F">05</text>
<text class="ts" x="132" y="426" text-anchor="middle" fill="#A32D2D">m<tspan font-size="10" dy="2">e</tspan><tspan dy="-2"> = 1 &lt; r</tspan></text>

<!-- Cf: [15 | 20] - exactly r, can't lend -->
<rect x="332" y="376" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="380" y1="376" x2="380" y2="412" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="356" y="394" text-anchor="middle" dominant-baseline="central" fill="#085041">15</text>
<text class="th" x="404" y="394" text-anchor="middle" dominant-baseline="central" fill="#085041">20</text>
<text class="ts" x="380" y="426" text-anchor="middle" fill="#993C1D">m = r = 2, ne</text>
<text class="ts" x="380" y="440" text-anchor="middle" fill="#993C1D">može pozajmiti</text>

<!-- ═══════════ Divider ═══════════ -->
<line x1="40" y1="460" x2="640" y2="460" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.3"/>

<!-- ═══════════════════════════════════════════ -->
<!-- STEP 3: MERGE                               -->
<!-- ═══════════════════════════════════════════ -->
<text class="th" x="40" y="482" fill="#854F0B">③ Spajanje: C<tspan font-size="12" dy="2">e</tspan><tspan dy="-2"> + ključ 10 iz C + C</tspan><tspan font-size="12" dy="2">f</tspan><tspan dy="-2">  →  novi čvor C</tspan><tspan font-size="12" dy="2">e</tspan><tspan dy="-2">'</tspan></text>
<text class="ts" x="40" y="500" fill="#888780">Nadređeni element (k = 10) silazi i spaja se sa C<tspan font-size="10" dy="2">e</tspan><tspan dy="-2"> i C</tspan><tspan font-size="10" dy="2">f</tspan><tspan dy="-2"> u jedan čvor od 2r elem.</tspan></text>

<!-- Parent C with 10 highlighted, about to descend -->
<rect x="196" y="520" width="288" height="38" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="276" y1="520" x2="276" y2="558" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="356" y1="520" x2="356" y2="558" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="420" y1="520" x2="420" y2="558" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="236" y="539" text-anchor="middle" dominant-baseline="central" fill="#444441">03</text>
<text class="th" x="388" y="539" text-anchor="middle" dominant-baseline="central" fill="#444441">30</text>
<text class="th" x="452" y="539" text-anchor="middle" dominant-baseline="central" fill="#444441">50</text>
<!-- 10 highlighted amber -->
<rect x="276" y="520" width="80" height="38" rx="0" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.2"/>
<text class="th" x="316" y="539" text-anchor="middle" dominant-baseline="central" fill="#633806">10</text>

<!-- Arrow: 10 descends into merge -->
<path d="M316 558 C316 580 280 596 270 610" fill="none" stroke="#BA7517" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
<text class="tl" x="340" y="588" text-anchor="start" fill="#854F0B">10 silazi u novi čvor</text>

<!-- Ce components flowing into merge -->
<rect x="108" y="620" width="48" height="36" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="132" y="638" text-anchor="middle" dominant-baseline="central" fill="#085041">05</text>
<text class="ts" x="132" y="610" text-anchor="middle" fill="#0F6E56">iz C<tspan font-size="10" dy="2">e</tspan></text>

<!-- + sign -->
<text class="th" x="172" y="638" text-anchor="middle" dominant-baseline="central" fill="#854F0B">+</text>

<!-- 10 from parent -->
<rect x="188" y="620" width="48" height="36" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
<text class="th" x="212" y="638" text-anchor="middle" dominant-baseline="central" fill="#633806">10</text>
<text class="ts" x="212" y="610" text-anchor="middle" fill="#854F0B">iz C</text>

<!-- + sign -->
<text class="th" x="252" y="638" text-anchor="middle" dominant-baseline="central" fill="#854F0B">+</text>

<!-- Cf components -->
<rect x="268" y="620" width="96" height="36" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="316" y1="620" x2="316" y2="656" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="292" y="638" text-anchor="middle" dominant-baseline="central" fill="#085041">15</text>
<text class="th" x="340" y="638" text-anchor="middle" dominant-baseline="central" fill="#085041">20</text>
<text class="ts" x="316" y="610" text-anchor="middle" fill="#0F6E56">iz C<tspan font-size="10" dy="2">f</tspan></text>

<!-- = sign -->
<text class="th" x="386" y="638" text-anchor="middle" dominant-baseline="central" fill="#534AB7">=</text>

<!-- Result Ce' -->
<rect x="404" y="620" width="192" height="36" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
<line x1="452" y1="620" x2="452" y2="656" stroke="#AFA9EC" stroke-width="0.5"/>
<line x1="500" y1="620" x2="500" y2="656" stroke="#AFA9EC" stroke-width="0.5"/>
<line x1="548" y1="620" x2="548" y2="656" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="428" y="638" text-anchor="middle" dominant-baseline="central" fill="#3C3489">05</text>
<text class="th" x="476" y="638" text-anchor="middle" dominant-baseline="central" fill="#3C3489">10</text>
<text class="th" x="524" y="638" text-anchor="middle" dominant-baseline="central" fill="#3C3489">15</text>
<text class="th" x="572" y="638" text-anchor="middle" dominant-baseline="central" fill="#3C3489">20</text>
<text class="ts" x="500" y="610" text-anchor="middle" fill="#534AB7">C<tspan font-size="10" dy="2">e</tspan><tspan dy="-2">' (2r = 4 elem.)</tspan></text>

<!-- ═══════════ Divider ═══════════ -->
<line x1="40" y1="680" x2="640" y2="680" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.3"/>

<!-- ═══════════════════════════════════════════ -->
<!-- STEP 4: FINAL STATE                         -->
<!-- ═══════════════════════════════════════════ -->
<text class="th" x="40" y="702" fill="#534AB7">④ Konačno stanje: čvor C izgubio element, moguća kaskada</text>

<!-- Parent C: [03 | 30 | 50] - lost element 10 -->
<text class="ts" x="312" y="720" text-anchor="middle" fill="#5F5E5A">nadređeni čvor C (izgubio ključ 10)</text>
<rect x="216" y="730" width="192" height="38" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="280" y1="730" x2="280" y2="768" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="344" y1="730" x2="344" y2="768" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="248" y="749" text-anchor="middle" dominant-baseline="central" fill="#444441">03</text>
<text class="th" x="312" y="749" text-anchor="middle" dominant-baseline="central" fill="#444441">30</text>
<text class="th" x="376" y="749" text-anchor="middle" dominant-baseline="central" fill="#444441">50</text>

<!-- Edges -->
<line x1="248" y1="768" x2="120" y2="816" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="280" y1="768" x2="358" y2="816" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="76" y="828" text-anchor="middle" fill="#B4B2A9">...</text>
<text class="ts" x="530" y="828" text-anchor="middle" fill="#B4B2A9">...</text>

<!-- Ce': [05 | 10 | 15 | 20] -->
<rect x="262" y="822" width="192" height="36" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<line x1="310" y1="822" x2="310" y2="858" stroke="#AFA9EC" stroke-width="0.5"/>
<line x1="358" y1="822" x2="358" y2="858" stroke="#AFA9EC" stroke-width="0.5"/>
<line x1="406" y1="822" x2="406" y2="858" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="286" y="840" text-anchor="middle" dominant-baseline="central" fill="#3C3489">05</text>
<text class="th" x="334" y="840" text-anchor="middle" dominant-baseline="central" fill="#3C3489">10</text>
<text class="th" x="382" y="840" text-anchor="middle" dominant-baseline="central" fill="#3C3489">15</text>
<text class="th" x="430" y="840" text-anchor="middle" dominant-baseline="central" fill="#3C3489">20</text>
<text class="ts" x="358" y="872" text-anchor="middle" fill="#534AB7">C<tspan font-size="10" dy="2">e</tspan><tspan dy="-2">': m = 2r = 4 ✓</tspan></text>

<!-- Warning about cascade -->
<rect x="40" y="900" width="600" height="42" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="ts" x="340" y="916" text-anchor="middle" fill="#633806">Čvor C je izgubio element 10.  Ako sada i C ima m &lt; r, isti postupak</text>
<text class="ts" x="340" y="932" text-anchor="middle" fill="#633806">se ponavlja naviše (kaskada). Ako koren ostane prazan → visina stabla se smanjuje za 1.</text>

</svg>