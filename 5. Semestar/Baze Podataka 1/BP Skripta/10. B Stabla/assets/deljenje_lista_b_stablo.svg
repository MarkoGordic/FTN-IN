<svg width="680" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  .th { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 500; }
  .ts { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 400; }
  .fill-teal-50 { fill: #E1F5EE; }
  .fill-teal-600 { stroke: #0F6E56; }
  .stroke-teal { stroke: #0F6E56; }
  .fill-amber-50 { fill: #FAEEDA; }
  .stroke-amber { stroke: #854F0B; }
  .fill-coral-50 { fill: #FAECE7; }
  .stroke-coral { stroke: #993C1D; }
  .fill-gray-50 { fill: #F1EFE8; }
  .stroke-gray { stroke: #5F5E5A; }
  .text-teal { fill: #085041; }
  .text-amber { fill: #633806; }
  .text-coral { fill: #712B13; }
  .text-gray { fill: #444441; }
  .text-muted { fill: #888780; }
  .text-dark { fill: #2C2C2A; }
</style>

<!-- ═══════════════ SECTION 1: BEFORE ═══════════════ -->
<text class="th" x="40" y="28" dominant-baseline="central" fill="#0F6E56">① Pun list (m = 2r = 4)</text>

<!-- Parent node -->
<rect x="250" y="50" width="180" height="38" rx="6" class="fill-gray-50" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th text-gray" x="340" y="69" text-anchor="middle" dominant-baseline="central">Nadređeni čvor</text>

<!-- Arrow parent to leaf -->
<line x1="340" y1="88" x2="340" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>

<!-- Full leaf: 4 cells [10|20|30|40] -->
<rect x="196" y="118" width="192" height="36" rx="6" class="fill-teal-50" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="244" y1="118" x2="244" y2="154" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="292" y1="118" x2="292" y2="154" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="340" y1="118" x2="340" y2="154" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th text-teal" x="220" y="136" text-anchor="middle" dominant-baseline="central">10</text>
<text class="th text-teal" x="268" y="136" text-anchor="middle" dominant-baseline="central">20</text>
<text class="th text-teal" x="316" y="136" text-anchor="middle" dominant-baseline="central">30</text>
<text class="th text-teal" x="364" y="136" text-anchor="middle" dominant-baseline="central">40</text>

<!-- New element 25 arriving -->
<rect x="448" y="118" width="48" height="36" rx="6" class="fill-coral-50" stroke="#D85A30" stroke-width="0.5"/>
<text class="th text-coral" x="472" y="136" text-anchor="middle" dominant-baseline="central">25</text>
<text class="ts" x="472" y="110" text-anchor="middle" fill="#993C1D">novi ključ</text>
<line x1="446" y1="136" x2="394" y2="136" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<!-- NEMA MESTA label -->
<text class="ts" x="420" y="170" text-anchor="middle" fill="#D85A30">Nema mesta!</text>

<!-- Divider -->
<line x1="40" y1="195" x2="640" y2="195" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

<!-- ═══════════════ SECTION 2: SORTED ARRAY ═══════════════ -->
<text class="th" x="40" y="220" dominant-baseline="central" fill="#854F0B">② Sortirani niz u memoriji (2r + 1 = 5)</text>

<!-- 5 cells: [10|20|25|30|40] -->
<!-- Left group (r=2): teal -->
<rect x="172" y="240" width="96" height="38" rx="0" class="fill-teal-50" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="220" y1="240" x2="220" y2="278" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th text-teal" x="196" y="259" text-anchor="middle" dominant-baseline="central">10</text>
<text class="th text-teal" x="244" y="259" text-anchor="middle" dominant-baseline="central">20</text>
<!-- Round left corners -->
<rect x="172" y="240" width="96" height="38" rx="0" fill="none" stroke="none"/>

<!-- Middle element: amber -->
<rect x="268" y="240" width="48" height="38" rx="0" class="fill-amber-50" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th text-amber" x="292" y="259" text-anchor="middle" dominant-baseline="central">25</text>

<!-- Right group (r=2): teal -->
<rect x="316" y="240" width="96" height="38" rx="0" class="fill-teal-50" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="364" y1="240" x2="364" y2="278" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th text-teal" x="340" y="259" text-anchor="middle" dominant-baseline="central">30</text>
<text class="th text-teal" x="388" y="259" text-anchor="middle" dominant-baseline="central">40</text>

<!-- Outer border -->
<rect x="172" y="240" width="240" height="38" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>

<!-- Bracket labels below -->
<line x1="172" y1="286" x2="268" y2="286" stroke="#0F6E56" stroke-width="1"/>
<line x1="172" y1="282" x2="172" y2="290" stroke="#0F6E56" stroke-width="1"/>
<line x1="268" y1="282" x2="268" y2="290" stroke="#0F6E56" stroke-width="1"/>
<text class="ts" x="220" y="302" text-anchor="middle" fill="#0F6E56">prvih r</text>

<line x1="268" y1="286" x2="316" y2="286" stroke="#854F0B" stroke-width="1"/>
<line x1="268" y1="282" x2="268" y2="290" stroke="#854F0B" stroke-width="1"/>
<line x1="316" y1="282" x2="316" y2="290" stroke="#854F0B" stroke-width="1"/>
<text class="ts" x="292" y="302" text-anchor="middle" fill="#854F0B">srednji</text>

<line x1="316" y1="286" x2="412" y2="286" stroke="#0F6E56" stroke-width="1"/>
<line x1="316" y1="282" x2="316" y2="290" stroke="#0F6E56" stroke-width="1"/>
<line x1="412" y1="282" x2="412" y2="290" stroke="#0F6E56" stroke-width="1"/>
<text class="ts" x="364" y="302" text-anchor="middle" fill="#0F6E56">poslednjih r</text>

<!-- Up arrow from middle element -->
<line x1="292" y1="240" x2="292" y2="220" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.6"/>
<text class="ts" x="440" y="259" text-anchor="start" fill="#854F0B">→ ide u nadređeni čvor</text>

<!-- Divider -->
<line x1="40" y1="325" x2="640" y2="325" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

<!-- ═══════════════ SECTION 3: RESULT ═══════════════ -->
<text class="th" x="40" y="350" dominant-baseline="central" fill="#534AB7">③ Rezultat deljenja</text>

<!-- Updated parent node -->
<text class="ts" x="300" y="367" text-anchor="middle" fill="#888780">nadređeni čvor (ažuriran)</text>
<rect x="210" y="375" width="180" height="38" rx="6" class="fill-gray-50" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="270" y1="375" x2="270" y2="413" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="330" y1="375" x2="330" y2="413" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th text-gray" x="240" y="394" text-anchor="middle" dominant-baseline="central">...</text>
<!-- Promoted 25 in amber -->
<rect x="270" y="375" width="60" height="38" rx="0" class="fill-amber-50" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th text-amber" x="300" y="394" text-anchor="middle" dominant-baseline="central">25</text>
<text class="th text-gray" x="360" y="394" text-anchor="middle" dominant-baseline="central">...</text>

<!-- Arrows from parent to leaves -->
<line x1="255" y1="413" x2="192" y2="458" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
<line x1="345" y1="413" x2="408" y2="458" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>

<!-- Left leaf [10|20] -->
<rect x="124" y="464" width="96" height="36" rx="6" class="fill-teal-50" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="172" y1="464" x2="172" y2="500" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th text-teal" x="148" y="482" text-anchor="middle" dominant-baseline="central">10</text>
<text class="th text-teal" x="196" y="482" text-anchor="middle" dominant-baseline="central">20</text>
<text class="ts" x="172" y="514" text-anchor="middle" fill="#0F6E56">levi list (r elem.)</text>

<!-- Right leaf [30|40] -->
<rect x="380" y="464" width="96" height="36" rx="6" class="fill-teal-50" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="428" y1="464" x2="428" y2="500" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th text-teal" x="404" y="482" text-anchor="middle" dominant-baseline="central">30</text>
<text class="th text-teal" x="452" y="482" text-anchor="middle" dominant-baseline="central">40</text>
<text class="ts" x="428" y="514" text-anchor="middle" fill="#0F6E56">desni list (r elem.)</text>

<!-- NEW label on right leaf -->
<text class="ts" x="428" y="456" text-anchor="middle" fill="#993C1D">novi list</text>

<!-- Bottom note -->
<text class="ts" x="40" y="548" fill="#888780">Primer: r = 2, umetanje ključa 25 u pun list [10, 20, 30, 40]</text>
<text class="ts" x="40" y="564" fill="#888780">Srednji element (25) se promoviše u nadređeni čvor</text>

</svg>