<text class="th" x="140" y="164" text-anchor="middle" dominant-baseline="central" fill="#085041">10</text>

<!-- Middle child: [20 | 25] -->
<rect x="284" y="146" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
