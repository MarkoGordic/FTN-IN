<line x1="586" y1="146" x2="586" y2="182" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="514" y="164" text-anchor="middle" dominant-baseline="central" fill="#085041">35</text>
<text class="th" x="562" y="164" text-anchor="middle" dominant-baseline="central" fill="#085041">40</text>
<text class="th" x="610" y="164" text-anchor="middle" dominant-baseline="central" fill="#085041">50</text>

<!-- 35 highlighted as successor -->
<rect x="490" y="146" width="48" height="36" rx="0" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="3 2"/>
<text class="ts" x="514" y="196" text-anchor="middle" fill="#854F0B">naslednik (prva veća</text>
<text class="ts" x="514" y="210" text-anchor="middle" fill="#854F0B">vrednost od 30)</text>

<!-- Dashed region around right subtree -->
<rect x="282" y="138" width="360" height="52" rx="10" fill="none" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
<text class="ts" x="462" y="133" text-anchor="middle" fill="#0F6E56">desno podstablo čvora sa ključem 30</text>

<!-- Curved arrow from 30 to 35 showing "find successor" -->
<path d="M388 70 Q450 50 480 80 Q510 110 514 140" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="tl" x="476" y="68" text-anchor="start" fill="#854F0B">traži krajnji</text>
<text class="tl" x="476" y="82" text-anchor="start" fill="#854F0B">levi element</text>

<!-- ═══════════ Divider ═══════════ -->
<line x1="40" y1="240" x2="640" y2="240" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

<!-- ═══════════ PHASE 2: SWAP ═══════════ -->
<text class="th" x="40" y="264" fill="#854F0B">② Zamena: kopiraj 35 na mesto 30</text>

<!-- Root node: [15 | 35 | 60] - 35 highlighted amber -->
<rect x="196" y="286" width="288" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
