<svg width="680" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  .th { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 600; }
  .ts { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 400; }
  .tl { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 500; }
</style>

<!-- ═══════════ PHASE 1: PRE ═══════════ -->
<text class="th" x="40" y="26" fill="#0F6E56">① Pre brisanja: ključ 30 je u unutrašnjem čvoru</text>

<!-- Root node: [15 | 30 | 60] -->
<rect x="196" y="50" width="288" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="292" y1="50" x2="292" y2="90" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="388" y1="50" x2="388" y2="90" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="244" y="70" text-anchor="middle" dominant-baseline="central" fill="#444441">15</text>
<text class="th" x="436" y="70" text-anchor="middle" dominant-baseline="central" fill="#444441">60</text>

<!-- 30 highlighted in coral -->
<rect x="292" y="50" width="96" height="40" rx="0" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
<text class="th" x="340" y="70" text-anchor="middle" dominant-baseline="central" fill="#712B13">30</text>
<text class="ts" x="340" y="44" text-anchor="middle" fill="#993C1D">briši me</text>

<!-- Arrows root → children -->
<line x1="244" y1="90" x2="130" y2="140" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="90" x2="340" y2="140" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="436" y1="90" x2="550" y2="140" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Left child: [5 | 10] -->
<rect x="68" y="146" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
