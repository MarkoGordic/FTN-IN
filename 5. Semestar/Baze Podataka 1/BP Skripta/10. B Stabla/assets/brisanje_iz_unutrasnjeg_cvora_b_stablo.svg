<text class="th" x="436" y="538" text-anchor="middle" dominant-baseline="central" fill="#444441">60</text>

<!-- Arrows root → children -->
<line x1="244" y1="558" x2="130" y2="608" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="558" x2="340" y2="608" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="436" y1="558" x2="530" y2="608" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Left child: [5 | 10] -->
<rect x="68" y="614" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="116" y1="614" x2="116" y2="650" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="92" y="632" text-anchor="middle" dominant-baseline="central" fill="#085041">5</text>
<text class="th" x="140" y="632" text-anchor="middle" dominant-baseline="central" fill="#085041">10</text>

<!-- Middle child: [20 | 25] -->
<rect x="284" y="614" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="332" y1="614" x2="332" y2="650" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="308" y="632" text-anchor="middle" dominant-baseline="central" fill="#085041">20</text>
<text class="th" x="356" y="632" text-anchor="middle" dominant-baseline="central" fill="#085041">25</text>

<!-- Right child: [40 | 50] - only 2 elements now -->
<rect x="484" y="614" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="532" y1="614" x2="532" y2="650" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="508" y="632" text-anchor="middle" dominant-baseline="central" fill="#085041">40</text>
<text class="th" x="556" y="632" text-anchor="middle" dominant-baseline="central" fill="#085041">50</text>

<!-- Verification annotations -->
<text class="ts" x="340" y="680" text-anchor="middle" fill="#888780">B-stablo svojstvo očuvano: {5,10} &lt; 15 &lt; {20,25} &lt; 35 &lt; {40,50} &lt; 60</text>
<text class="ts" x="340" y="696" text-anchor="middle" fill="#888780">Brisanje iz unutrašnjeg čvora se svodi na brisanje iz lista (slučaj A)</text>

</svg>