<line x1="388" y1="286" x2="388" y2="326" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="244" y="306" text-anchor="middle" dominant-baseline="central" fill="#444441">15</text>
<text class="th" x="436" y="306" text-anchor="middle" dominant-baseline="central" fill="#444441">60</text>

<!-- 35 amber in root -->
<rect x="292" y="286" width="96" height="40" rx="0" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
<text class="th" x="340" y="306" text-anchor="middle" dominant-baseline="central" fill="#633806">35</text>
<text class="ts" x="340" y="280" text-anchor="middle" fill="#854F0B">zamenjeno!</text>

<!-- Arrows root → children -->
<line x1="244" y1="326" x2="130" y2="376" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
