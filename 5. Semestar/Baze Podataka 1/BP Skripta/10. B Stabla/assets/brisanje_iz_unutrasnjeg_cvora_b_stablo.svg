<line x1="436" y1="326" x2="550" y2="376" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Left child: [5 | 10] -->
<rect x="68" y="382" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="116" y1="382" x2="116" y2="418" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="92" y="400" text-anchor="middle" dominant-baseline="central" fill="#085041">5</text>
<text class="th" x="140" y="400" text-anchor="middle" dominant-baseline="central" fill="#085041">10</text>

<!-- Middle child: [20 | 25] -->
<rect x="284" y="382" width="96" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="332" y1="382" x2="332" y2="418" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="308" y="400" text-anchor="middle" dominant-baseline="central" fill="#085041">20</text>
<text class="th" x="356" y="400" text-anchor="middle" dominant-baseline="central" fill="#085041">25</text>

<!-- Right child: [35̶ | 40 | 50] - 35 crossed out in coral -->
<rect x="490" y="382" width="144" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="538" y1="382" x2="538" y2="418" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="586" y1="382" x2="586" y2="418" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="562" y="400" text-anchor="middle" dominant-baseline="central" fill="#085041">40</text>
<text class="th" x="610" y="400" text-anchor="middle" dominant-baseline="central" fill="#085041">50</text>

<!-- 35 crossed out -->
<rect x="490" y="382" width="48" height="36" rx="0" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text class="th" x="514" y="400" text-anchor="middle" dominant-baseline="central" fill="#791F1F">35</text>
<line x1="494" y1="386" x2="534" y2="414" stroke="#E24B4A" stroke-width="1.5"/>
<line x1="534" y1="386" x2="494" y2="414" stroke="#E24B4A" stroke-width="1.5"/>
<text class="ts" x="514" y="432" text-anchor="middle" fill="#A32D2D">obriši iz lista</text>
<text class="ts" x="514" y="446" text-anchor="middle" fill="#888780">→ slučaj A</text>

<!-- ═══════════ Divider ═══════════ -->
<line x1="40" y1="472" x2="640" y2="472" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

<!-- ═══════════ PHASE 3: FINAL ═══════════ -->
<text class="th" x="40" y="496" fill="#534AB7">③ Konačno stanje</text>

<!-- Root node: [15 | 35 | 60] -->
<rect x="196" y="518" width="288" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="292" y1="518" x2="292" y2="558" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="388" y1="518" x2="388" y2="558" stroke="#B4B2A9" stroke-width="0.5"/>
